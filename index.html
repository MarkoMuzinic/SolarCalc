<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solarni Kalkulator☀️</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>

    <div class="main">
        <div class="box">
            <h1>Solarni Kalkulator☀️</h1>
            <p style="font-weight: 700;">Unesite potrebne podatke kako biste izračunali potencijalnu uštedu i povrat investicije za solarne panele.</p>
            <form action="/calculate" method="post">

                <label for="energy_consumption">Mjesečna potrošnja energije (kWh):</label><br>
                <input type="number" id="energy_consumption" name="energy_consumption" required><br><br>

                <label for="panel_cost">Cijena po panelu (€):</label><br>
                <input type="number" id="panel_cost" name="panel_cost" required><br><br>

                <label for="installation_cost">Trošak instalacije (€):</label><br>
                <input type="number" id="installation_cost" name="installation_cost" required><br><br>

                <label for="price_per_kwh">Cijena električne energije (€/kWh):</label><br>
                <input type="number" id="price_per_kwh" name="price_per_kwh" step="0.01" min="0" value="0.20"><br><br>

                <input type="submit" value="Izračunaj">
            </form>

            <div id="results" class="results" aria-live="polite" style="display:none; margin-top:16px;"></div>
            <button class="anketa" onclick="window.open('https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=DQSIkWdsW0yxEjajBLZtrQAAAAAAAAAAAAN__6w0Zs5UQlI4V0JWN0daNlg3UUxYMThTSDNVV0E4Qi4u', '_blank')">Riješi našu zelenu anketu</button>
        </div>
    </div>

    <header class="footer" role="banner">
        <span class="scroll-indicator left" aria-hidden="true">◀</span>
        <nav class="footer-nav" aria-label="Top links">
            <button class="link" onclick="window.open('poster.html', '_blank')">O obnovljivim izvorima energije</button>
            <button class="link" onclick="window.open('https://www.hep.hr/elektra/kucanstvo/tarifne-stavke-cijene/1547', '_blank')">HEP cijene</button>
            <button class="link" onclick="window.open('https://re.jrc.ec.europa.eu/pvg_tools/en/tools.html', '_blank')">Količina svjetlosti po području</button>
            <button class="link" onclick="window.open('https://www.hep.hr/ods/korisnici/kupac-s-vlastitom-proizvodnjom/29', '_blank')">HEP o solarnim panelima</button>
            <button class="link" onclick="window.open('https://www.zez.coop/', '_blank')">ZEZ</button>
        </nav>
        <button class="link" onclick="window.open('https://trema.hr/', '_blank')">O našoj školi</button>
        <span class="scroll-indicator right" aria-hidden="true">▶</span>
    </header>

    <script>
    (function (){
        const form = document.querySelector('form');
        const results = document.getElementById('results');
        const fmt = (n) => Number(n).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});

        form.addEventListener('submit', function (e){
            e.preventDefault();
            const energy = parseFloat(document.getElementById('energy_consumption').value);
            const panelCost = parseFloat(document.getElementById('panel_cost').value);
            const installCost = parseFloat(document.getElementById('installation_cost').value);
            const priceInput = parseFloat(document.getElementById('price_per_kwh').value);

            if (isNaN(energy) || isNaN(panelCost) || isNaN(installCost)){
                results.style.display = 'block';
                results.innerHTML = '<p style="color:#c00">Molimo unesite sve vrijednosti.</p>';
                return;
            }

            // Assumptions (adjustable in code):
            const productionPerPanelPerDay = 4; // kWh per panel per day (typical average)
            const daysPerMonth = 30;
            const productionPerPanelPerMonth = productionPerPanelPerDay * daysPerMonth;
            // use user-entered price if valid, otherwise fallback to default
            const pricePerKwh = !isNaN(priceInput) && priceInput > 0 ? priceInput : 0.20; // EUR per kWh

            const panelsNeeded = Math.max(1, Math.ceil(energy / productionPerPanelPerMonth));
            const totalPanelCost = panelsNeeded * panelCost;
            const totalCost = totalPanelCost + installCost;
            const monthlySavings = energy * pricePerKwh;
            const annualSavings = monthlySavings * 12;
            const paybackYears = annualSavings > 0 ? totalCost / annualSavings : Infinity;
            const profit10yrs = annualSavings * 10 - totalCost;

            results.style.display = 'block';
            results.innerHTML = `
                <div class="result-card">
                    <h2>Rezultati</h2>
                    <p>Broj panela potrebnih: <strong>${panelsNeeded}</strong></p>
                    <p>Ukupna nabava panela: <strong>€${fmt(totalPanelCost)}</strong></p>
                    <p>Ukupni trošak (paneli + instalacija): <strong>€${fmt(totalCost)}</strong></p>
                    <p>Mjesečna ušteda (pri cijeni €${fmt(pricePerKwh)}/kWh): <strong>€${fmt(monthlySavings)}</strong></p>
                    <p>Godišnja ušteda: <strong>€${fmt(annualSavings)}</strong></p>
                    <p>Procijenjeno vrijeme povrata: <strong>${isFinite(paybackYears) ? fmt(paybackYears) + ' godina' : '—'}</strong></p>
                    <p>Procijenjeni profit za 10 godina: <strong>€${fmt(profit10yrs)}</strong></p>
                    <small>Napomena: koristi se pretpostavka od ${productionPerPanelPerDay} kWh/panel/dan i cijena električne energije €${fmt(pricePerKwh)}/kWh. Za točniju procjenu prilagodite ove vrijednosti.</small>
                </div>
            `;
        });
    })();
    </script>

</body>
</html>
